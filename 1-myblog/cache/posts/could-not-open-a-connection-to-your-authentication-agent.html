<p>在执行ssh-add时，如果出现“Could not open a connection to your authentication agent”这一错误信息，可以通过如下方法解决：</p>
<pre class="code bash"><a name="rest_code_588ee019ed0b42d7ae031cc5f3f0b727-1"></a>&gt;&gt; <span class="nb">eval</span> <span class="sb">`</span>ssh-agent<span class="sb">`</span>
</pre><p><strong>注意</strong> 是 <strong>`</strong> 而不是 <strong>'</strong> 。</p>
