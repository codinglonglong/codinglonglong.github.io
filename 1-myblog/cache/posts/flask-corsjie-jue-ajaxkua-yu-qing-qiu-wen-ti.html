<p>在本地开发网站的过程中，js访问后端服务会出现</p>
<pre class="code bash"><a name="rest_code_42b613c4caa94dd196a6fcdbd808d0a9-1"></a>已拦截跨源请求：同源策略禁止读取位于 http://192.168.99.100:8080/signup/ 的远程资源。（原因：CORS 头缺少 <span class="s1">&#39;Access-Control-Allow-Origin&#39;</span>）。
</pre><p>这时可以通过Flask-CORS解决问题。</p>
<p>1、安装。</p>
<blockquote>
<pre class="code bash"><a name="rest_code_3217a0f02fdc43f28263fc38bd0f96ea-1"></a>pip install flask-cors
</pre></blockquote>
<p>2、使用。</p>
<blockquote>
<table class="codetable"><tr><td class="linenos"><div class="linenodiv"><pre><a href="#rest_code_0043df372b044bbc8baf1c8bc07fb5ac-1">1</a>
<a href="#rest_code_0043df372b044bbc8baf1c8bc07fb5ac-2">2</a>
<a href="#rest_code_0043df372b044bbc8baf1c8bc07fb5ac-3">3</a></pre></div></td><td class="code"><pre class="code python"><a name="rest_code_0043df372b044bbc8baf1c8bc07fb5ac-1"></a><span class="kn">from</span> <span class="nn">flask_cors</span> <span class="kn">import</span> <span class="n">CORS</span>
<a name="rest_code_0043df372b044bbc8baf1c8bc07fb5ac-2"></a><span class="n">global_app</span> <span class="o">=</span> <span class="n">Flask</span><span class="p">(</span><span class="vm">__name__</span><span class="p">)</span>
<a name="rest_code_0043df372b044bbc8baf1c8bc07fb5ac-3"></a><span class="n">CORS</span><span class="p">(</span><span class="n">global_app</span><span class="p">)</span>
</pre></td></tr></table></blockquote>
