<p>在本地开发网站的过程中，js访问后端服务会出现</p>
<pre class="code bash"><a name="rest_code_fef82e4e61bd4c4c8897a9a4a65fd158-1"></a>已拦截跨源请求：同源策略禁止读取位于 http://192.168.99.100:8080/signup/ 的远程资源。（原因：CORS 头缺少 <span class="s1">&#39;Access-Control-Allow-Origin&#39;</span>）。
</pre><p>这时可以通过Flask-CORS解决问题。</p>
<p>1、安装。</p>
<blockquote>
<pre class="code bash"><a name="rest_code_c16b1f367c5b43bf9af1719efb26fe52-1"></a>pip install flask-cors
</pre></blockquote>
<p>2、使用。</p>
<blockquote>
<table class="codetable"><tr><td class="linenos"><div class="linenodiv"><pre><a href="#rest_code_5468c0eb127a4f0db626c05351dbd9e8-1">1</a>
<a href="#rest_code_5468c0eb127a4f0db626c05351dbd9e8-2">2</a>
<a href="#rest_code_5468c0eb127a4f0db626c05351dbd9e8-3">3</a></pre></div></td><td class="code"><pre class="code python"><a name="rest_code_5468c0eb127a4f0db626c05351dbd9e8-1"></a><span class="kn">from</span> <span class="nn">flask_cors</span> <span class="kn">import</span> <span class="n">CORS</span>
<a name="rest_code_5468c0eb127a4f0db626c05351dbd9e8-2"></a><span class="n">global_app</span> <span class="o">=</span> <span class="n">Flask</span><span class="p">(</span><span class="n">__name__</span><span class="p">)</span>
<a name="rest_code_5468c0eb127a4f0db626c05351dbd9e8-3"></a><span class="n">CORS</span><span class="p">(</span><span class="n">global_app</span><span class="p">)</span>
</pre></td></tr></table></blockquote>
