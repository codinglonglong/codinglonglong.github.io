<p>题目：</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-8.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-8.PNG" />
<p>这道题的难点在于怎么画下面的90度和上面的75度，我们将用圆来解决这个问题。</p>
<p>1、画出明显已知的部分。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-1.PNG" />
<p>2、利用直角三角形斜边中线等于斜边一半的原理，以斜边为直径画圆，确定直角的位置。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-2.PNG" />
<p>3、作出等分点和垂线。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-3.PNG" />
<p>4、因为顶角是75度，作一条与基线是呈15度的斜线。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-4.PNG" />
<p>5、在基线的中点作一条垂线，与上一步中的斜线相交于一点，过这点画圆，与第3步中的垂线交于一点。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-5.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-5.PNG" />
<p>6、连接三个已知点，得到75度顶角。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-6.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-6.PNG" />
<p>7、清理图形。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p8-7.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p8-7.PNG" />
