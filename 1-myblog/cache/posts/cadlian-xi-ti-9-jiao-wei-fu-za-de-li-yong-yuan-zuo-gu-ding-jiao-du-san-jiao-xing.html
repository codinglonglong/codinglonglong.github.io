<p>这道题看上去较为复杂，但实际上还是利用圆作固定角度三角形。</p>
<p>1、画出明显已知的部分。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p9-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p9-1.PNG" />
<p>2、画出下半部分的90度。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p9-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p9-2.PNG" />
<p>3、作等分和旋转作垂线。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p9-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p9-3.PNG" />
<p>4、先处理右侧的72度，由于顶角是72度，所以作一条18度的斜线和过基线中点的垂线，以相交的点为圆心画圆。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p9-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p9-4.PNG" />
<p>5、上一步的圆与最右侧垂线交于一点，连接三点，得到72度顶角。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p9-5.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p9-5.PNG" />
<p>6、同样原理，得到其他三个角，注意每次基线长度是不同的。</p>
