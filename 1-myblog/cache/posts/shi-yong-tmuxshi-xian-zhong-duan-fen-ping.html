<p>在终端下工作时，经常要打开多个窗口，运用Tmux就可以只开一个终端，分屏进行操作了。</p>
<p>首先按下Ctrl-b，然后按下对应按键完成功能：</p>
<table border="1" class="docutils">
<colgroup>
<col width="19%" />
<col width="81%" />
</colgroup>
<thead valign="bottom">
<tr><th class="head">按键</th>
<th class="head">功能</th>
</tr>
</thead>
<tbody valign="top">
<tr><td>s</td>
<td>列出所有会话</td>
</tr>
<tr><td>$</td>
<td>重命名当前会话</td>
</tr>
<tr><td>d</td>
<td>断开当前会话</td>
</tr>
<tr><td>c</td>
<td>创建一个新窗口</td>
</tr>
<tr><td>,</td>
<td>重命名当前窗口</td>
</tr>
<tr><td>w</td>
<td>列出所有窗口</td>
</tr>
<tr><td>%</td>
<td>水平分割窗口</td>
</tr>
<tr><td>&quot;</td>
<td>竖直分割窗口</td>
</tr>
<tr><td>n</td>
<td>下一个窗口</td>
</tr>
<tr><td>p</td>
<td>上一个窗口</td>
</tr>
<tr><td>0~9</td>
<td>选择对应的窗口</td>
</tr>
<tr><td>q</td>
<td>显示窗格的编号</td>
</tr>
<tr><td>l</td>
<td>与上一个窗口循环切换</td>
</tr>
<tr><td>o</td>
<td>在窗格之间切换</td>
</tr>
<tr><td>}</td>
<td>与下一个窗格交换位置</td>
</tr>
<tr><td>{</td>
<td>与上一个窗格交换位置</td>
</tr>
<tr><td>!</td>
<td>在新窗口中显示当前窗格</td>
</tr>
<tr><td>x</td>
<td>关闭当前窗格</td>
</tr>
<tr><td>t</td>
<td>显示当前时间</td>
</tr>
</tbody>
</table>
