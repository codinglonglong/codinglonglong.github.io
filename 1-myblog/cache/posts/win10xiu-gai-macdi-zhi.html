<p>1、打开注册表编辑器，“运行”-&gt;“regedit”。</p>
<p>2、找到如下路径，得到下图：</p>
<p><strong>HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Class\{4D36E972-E325-11CE-BFC1-08002bE10318}</strong></p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/modifymac1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/modifymac1.PNG" />
<p>3、右击&quot;0003&quot;-&gt;&quot;新建&quot;-&gt;&quot;字符串值&quot;-&gt;&quot;NetworkAddress&quot;。</p>
<p>4、双击“NetworkAddress”，输入新的MAC地址值，比如“0028F80AF812”。</p>
<p>5、点击“确定”，重启电脑即可。</p>
