<p>这道题主要涉及到平行、偏移和移动，三个主要的工具。</p>
<p>1、利用平行，画出部分已知图形。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p1-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p1-1.PNG" />
<p>2、因为没法直接连上，先在旁边画上其他已知图形，找找机会。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p1-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p1-2.PNG" />
<p>3、图中的106是连接两个图形的关键点，另外就是图中蓝色的垂线，这条垂线给定了偏移距离。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p1-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p1-3.PNG" />
<p>4、偏移左边图形顶端线，与106水平线交于一点，这个点就是右边图形要移动到的目标点，移动图形。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p1-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p1-4.PNG" />
<p>5、去掉多余的线，得到结果。</p>
