<p>这道题知道圆过点、相切圆、半径，既不符合相切相切半径、也不符合三边相切。那么怎么画呢？</p>
<p>1、先画已知的部分。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-1.PNG" />
<p>2、由于过一点又知道半径，那么我们从这一点为圆心画圆，目标弧的圆心一定在这个圆上。同时又知道外切圆，所以圆心之间连线长度等于半径之和，所以一个圆半径是35，一个圆半径是50，总长度是85。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-2.PNG" />
<p>3、上一步中两个圆的交点就是目标弧的圆心。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-3.PNG" />
<p>4、清理图形。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-4.PNG" />
<p>5、同样的画法来画左边的80，但是注意这个是内切圆了，所以半径是减法，一个圆半径是80，一个圆半径是35，总长度是45。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-5.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-5.PNG" />
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p12-6.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p12-6.PNG" />
<p>6、清理图形。</p>
