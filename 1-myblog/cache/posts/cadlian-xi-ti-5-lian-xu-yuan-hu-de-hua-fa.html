<p>这道题看上去很乱，大部分都可以慢慢画出来，主要需要留意的是右侧上下对称的连续圆弧。</p>
<p>1、先把明显的地方画好。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-1.PNG" />
<p>2、处理上边的小圆。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-2.PNG" />
<p>3、留意到，中间小圆与上边小圆连线为半径画的圆，正好是”蚕豆“中间的参考线。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-3.PNG" />
<p>4、相切相切半径画出整个“蚕豆”图形。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-4.PNG" />
<p>5、处理右侧简单部分。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-5.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-5.PNG" />
<p>6、处理连续圆弧，而连续圆弧的定位，靠的是与半径82.6圆的相切，现有条件下，如果没有这个相切，连续圆弧无法定位。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p5-6.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p5-6.PNG" />
<p>7、清理图形。</p>
