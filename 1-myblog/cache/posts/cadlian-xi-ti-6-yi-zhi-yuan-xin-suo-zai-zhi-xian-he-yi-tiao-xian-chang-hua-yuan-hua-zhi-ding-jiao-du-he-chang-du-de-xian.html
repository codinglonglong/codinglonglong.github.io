<p>这道题的难点主要有两个：已知圆心及所在直线和圆上的一条弦长，如何画圆；如何画一条指定角度和长度的弦。</p>
<p>1、明显可画的部分比较少。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p6-1.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p6-1.PNG" />
<p>2、因为已知弦长，所以利用平移二分之一弦长的方法，将圆心所在直线向两侧平移。即可得到圆上两点。类似的方法还可以用在角平分线环境中。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p6-2.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p6-2.PNG" />
<p>3、在外部作一个等大的圆，画一条指定长度的水平弦，作图方法和上一步类似。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p6-3.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p6-3.PNG" />
<p>4、旋转上一步的圆到指定角度。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p6-4.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p6-4.PNG" />
<p>5、移动外部圆，使得两圆重合，这道题的难点就解决了。</p>
<img alt="https://github.com/longlongpicture/myblogpicture/raw/master/p6-5.PNG" src="https://github.com/longlongpicture/myblogpicture/raw/master/p6-5.PNG" />
