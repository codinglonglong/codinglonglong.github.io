<p><strong>句子分析</strong></p>
<p>御主人、あなたです！！！</p>
<p>她丈夫，就是你！！！</p>
<p><strong>词语分析</strong></p>
<ol class="arabic simple">
<li>御主人（ごしゅじん）：她丈夫。</li>
<li>貴方（あなた）：你。</li>
</ol>

<p><strong>句子分析</strong></p>
<p>じょ、冗談はよしたまえ…</p>
<p>别，这个玩笑真好……</p>
<p><strong>词语分析</strong></p>
<ol class="arabic simple">
<li>じょ：不，别。（<strong>按照句意应该这么翻译，但是词典没查到……</strong>）</li>
<li>冗談（じょうだん）：玩笑。</li>
<li>よし：好。</li>
</ol>
<p><strong>语法分析</strong></p>
<ol class="arabic simple">
<li>たまえ：接在动词连用形后面，表示“...吧”，一般由成年男子使用，常用于命令部下或下辈。</li>
</ol>
